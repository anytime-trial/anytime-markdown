        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping sheet release."

      - name: Download VSIX from CI
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: vsix-sheet-ci
          path: packages/vscode-sheet-extension

      - uses: actions/setup-node@v6
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version-file: '.node-version'

      - name: Publish to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
        working-directory: packages/vscode-sheet-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
