name: CI / Publish VS Code Extension

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # develop push: 型チェック・lint のみ（高速フィードバック）
      # develop PR: 型チェック・lint のみ
      # master PR: 全項目実行（品質ゲート）
      # master push: ビルド・VSIX 作成のみ（PR で検証済み、publish 用）
      - name: Check for duplicate core dependencies
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: |
          for pkg in next react typescript; do
            count=$(npm ls "$pkg" 2>/dev/null | grep -c "$pkg@" || true)
            if [ "$count" -gt 1 ]; then
              echo "::warning::Multiple versions of $pkg detected"
              npm ls "$pkg" 2>/dev/null
            fi
          done

      - name: Security audit
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npm audit --audit-level=critical --omit=dev

      - name: Type check
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
        run: npx tsc --noEmit

      - name: Lint
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
        run: npm run lint

      - name: Run markdown-core tests with coverage
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/markdown-core

      - name: Run mcp-markdown tests
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1
        working-directory: packages/mcp-markdown

      - name: Run graph-core tests with coverage
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1 --coverage --coverageReporters=lcov
        working-directory: packages/graph-core

      - name: Run mcp-graph tests
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1
        working-directory: packages/mcp-graph

      - name: Run database-core tests with coverage
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1 --coverage --coverageReporters=lcov
        working-directory: packages/database-core

      - name: Run database-viewer tests with coverage
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1 --coverage --coverageReporters=lcov
        working-directory: packages/database-viewer

      - name: Run cms-core tests with coverage
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1 --coverage --coverageReporters=lcov
        working-directory: packages/cms-core

      - name: Run mcp-cms tests
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --passWithNoTests --maxWorkers=1
        working-directory: packages/mcp-cms

      - name: Run mcp-cms-remote tests
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1
        working-directory: packages/mcp-cms-remote

      - name: Run web-app tests with coverage
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/web-app

      - name: Build web-app
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx next build | tee build-output.txt
        working-directory: packages/web-app

      - name: Extract bundle size report
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        working-directory: packages/web-app
        run: |
          echo "## Bundle Size Report" > bundle-report.md
          echo '```' >> bundle-report.md
          grep -E '(^[├└○ƒ\+]|First Load)' build-output.txt >> bundle-report.md || true
          echo '```' >> bundle-report.md
          cat bundle-report.md

      - name: Upload bundle report
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: packages/web-app/bundle-report.md
          retention-days: 7

      - name: Build vscode-common
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npm run build
        working-directory: packages/vscode-common

      - name: Build markdown extension
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npm run package
        working-directory: packages/vscode-markdown-extension

      - name: Package markdown VSIX
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-markdown-extension

      - name: Upload markdown VSIX artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-markdown-ci
          path: packages/vscode-markdown-extension/*.vsix
          retention-days: 3

      - name: Build graph extension
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npm run package
        working-directory: packages/vscode-graph-extension

      - name: Package graph VSIX
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-graph-extension

      - name: Upload graph VSIX artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-graph-ci
          path: packages/vscode-graph-extension/*.vsix
          retention-days: 3

      - name: Run history extension tests
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx jest --maxWorkers=1
        working-directory: packages/vscode-history-extension

      # trail-extension のテストは保護領域（~/.claude, ~/.vscode-server）への
      # 書き込みが禁止されているため、HOME を使い捨てディレクトリに差し替えて
      # 万一 guard を通過しても本物のユーザーデータを汚染しない構成にする。
      - name: Run trail extension tests (isolated HOME)
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        working-directory: packages/vscode-trail-extension
        env:
          # 一時 HOME を指定して、拡張機能の本番パスフォールバックが
          # 仮にガードを貫通した場合でも RUNNER_TEMP 内で完結するようにする。
          # ガード自体（assertNotProductionWriteDuringTests）はこのパスを
          # 保護対象と判定するため書き込みは例外となる。
          HOME: ${{ runner.temp }}/trail-test-home
        run: |
          mkdir -p "$HOME"
          npx jest --maxWorkers=1
          # ガード・ファクトリが機能していれば、このディレクトリに .claude
          # / .vscode-server は作られないはず。作られていればテストが
          # 保護領域に書き込んでいる証拠なので CI を落とす。
          if [ -e "$HOME/.claude" ] || [ -e "$HOME/.vscode-server" ]; then
            echo "::error::Protected-path side effect detected under isolated HOME"
            find "$HOME" -maxdepth 3 -type f | head -20
            exit 1
          fi

      - name: Build history extension
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npm run package
        working-directory: packages/vscode-history-extension

      - name: Package history VSIX
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-history-extension

      - name: Upload history VSIX artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-history-ci
          path: packages/vscode-history-extension/*.vsix
          retention-days: 3

      # trail は better-sqlite3 (native binding) を同梱するため
      # OS/アーキ別の matrix ビルドが必要 (build-trail job 参照)。

      - name: Build sheet extension
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npm run package
        working-directory: packages/vscode-sheet-extension

      - name: Package sheet VSIX
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-sheet-extension

      - name: Upload sheet VSIX artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-sheet-ci
          path: packages/vscode-sheet-extension/*.vsix
          retention-days: 3

      - name: Package extension pack VSIX
        if: (github.event_name == 'pull_request' && github.base_ref == 'master') || github.ref == 'refs/heads/master'
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-extension-pack

      - name: Upload extension pack VSIX artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-extension-pack-ci
          path: packages/vscode-extension-pack/*.vsix
          retention-days: 3

      # e2e: master PR → 3ブラウザ、それ以外 → スキップ
      - name: Install Playwright browsers
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: packages/web-app

      - name: Run e2e tests
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: xvfb-run npm run e2e
        working-directory: packages/web-app
        env:
          AUTH_SECRET: test-secret-for-ci

  check-netlify:
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Netlify deploy and check status
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 00d05d84-ac2d-489e-88ee-242d1a526bb9
          BRANCH: ${{ github.head_ref }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Checking Netlify deploy for branch: $BRANCH (commit: $COMMIT_SHA)"
          for i in $(seq 1 30); do
            RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=10")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Netlify API returned HTTP $HTTP_CODE (attempt $i/30)"
              echo "$BODY" | head -5
              sleep 30
              continue
            fi

            if [ "$i" = "1" ]; then
              echo "--- Recent deploys ---"
              echo "$BODY" | jq -r '.[:5] | .[] | "\(.context) | \(.branch) | \(.state) | \(.commit_ref[:8])"'
              echo "---"
            fi

            DEPLOY=$(echo "$BODY" | jq --arg branch "$BRANCH" -r \
              '[.[] | select(.context == "deploy-preview" and .branch == $branch)] | first // empty')

            if [ -z "$DEPLOY" ]; then
              echo "Deploy not found yet... (attempt $i/30)"
              sleep 30
              continue
            fi

            STATE=$(echo "$DEPLOY" | jq -r '.state')
            DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.id')
            echo "Deploy state: $STATE (id: $DEPLOY_ID)"

            case "$STATE" in
              ready)
                echo "Netlify deploy succeeded"
                echo "$DEPLOY" | jq '{state, deploy_ssl_url, deploy_time, created_at, commit_ref}'
                exit 0
                ;;
              error)
                echo "::error::Netlify deploy failed"
                echo "$DEPLOY" | jq '{state, error_message, deploy_ssl_url, created_at, commit_ref}'
                echo "--- Deploy details ---"
                curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
                  "https://api.netlify.com/api/v1/deploys/$DEPLOY_ID" \
                  | jq '{state, error_message, summary, deploy_time, context, branch}'
                exit 1
                ;;
              *)
                echo "Deploy in progress ($STATE)... (attempt $i/30)"
                sleep 30
                ;;
            esac
          done
          echo "::warning::Timed out waiting for Netlify deploy (15 min)"
          exit 1

  publish-markdown:
    if: github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=v$(node -p "require('./packages/vscode-markdown-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping markdown release."

      - name: Download VSIX from CI
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: vsix-markdown-ci
          path: packages/vscode-markdown-extension

      - uses: actions/setup-node@v6
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version-file: '.node-version'

      - name: Publish to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
        working-directory: packages/vscode-markdown-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Anytime Markdown ${{ steps.version.outputs.version }}
          files: packages/vscode-markdown-extension/*.vsix
          generate_release_notes: true

  publish-graph:
    if: github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=graph-v$(node -p "require('./packages/vscode-graph-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping graph release."

      - name: Download VSIX from CI
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: vsix-graph-ci
          path: packages/vscode-graph-extension

      - uses: actions/setup-node@v6
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version-file: '.node-version'

      - name: Publish to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
        working-directory: packages/vscode-graph-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Anytime Graph ${{ steps.version.outputs.version }}
          files: packages/vscode-graph-extension/*.vsix
          generate_release_notes: true

  publish-history:
    if: github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=history-v$(node -p "require('./packages/vscode-history-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping history release."

      - name: Download VSIX from CI
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: vsix-history-ci
          path: packages/vscode-history-extension

      - uses: actions/setup-node@v6
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version-file: '.node-version'

      - name: Publish to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
        working-directory: packages/vscode-history-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Anytime History ${{ steps.version.outputs.version }}
          files: packages/vscode-history-extension/*.vsix
          generate_release_notes: true

  publish-trail:
    if: github.ref == 'refs/heads/master'
    needs: [ci, build-trail]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=trail-v$(node -p "require('./packages/vscode-trail-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping trail release."

      - name: Download all platform VSIX artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-trail-ci-*
          path: packages/vscode-trail-extension
          merge-multiple: true

      - uses: actions/setup-node@v6
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version-file: '.node-version'

      - name: Publish all platform VSIX to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          npx vsce publish \
            --packagePath \
              anytime-trail-linux-x64.vsix \
              anytime-trail-linux-arm64.vsix \
              anytime-trail-win32-x64.vsix \
              anytime-trail-win32-arm64.vsix \
            --pat "$VSCE_PAT"
        working-directory: packages/vscode-trail-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Anytime Trail ${{ steps.version.outputs.version }}
          files: packages/vscode-trail-extension/anytime-trail-*.vsix
          generate_release_notes: true

