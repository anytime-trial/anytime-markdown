name: Build anytime-database VSIX (per-platform)

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
    paths:
      - "packages/vscode-database-extension/**"
      - "packages/database-core/**"
      - "packages/database-viewer/**"
      - ".github/workflows/build-anytime-database.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [linux-x64, linux-arm64, darwin-x64, darwin-arm64, win32-x64, win32-arm64]
    runs-on: ${{ startsWith(matrix.target, 'darwin-arm') && 'macos-14' || startsWith(matrix.target, 'darwin') && 'macos-13' || startsWith(matrix.target, 'linux') && 'ubuntu-22.04' || 'windows-2022' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Rebuild better-sqlite3 for ARM64
        if: matrix.target == 'linux-arm64' || matrix.target == 'win32-arm64'
        run: npm rebuild --workspace=anytime-database better-sqlite3 --target_arch=arm64
      - name: Build extension
        run: npm run package --workspace=anytime-database
      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --target ${{ matrix.target }} --out anytime-database-${{ matrix.target }}.vsix
        working-directory: packages/vscode-database-extension
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anytime-database-${{ matrix.target }}
          path: packages/vscode-database-extension/anytime-database-*.vsix

  publish-database:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=database-v$(node -p "require('./packages/vscode-database-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping database release."

      - name: Download all platform VSIX artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: anytime-database-*
          path: vsix
          merge-multiple: true

      - name: List downloaded VSIX
        if: steps.tag_check.outputs.exists == 'false'
        run: ls -la vsix/

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 22

      - name: Publish all platform VSIX to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          npx @vscode/vsce publish \
            --packagePath \
              vsix/anytime-database-linux-x64.vsix \
              vsix/anytime-database-linux-arm64.vsix \
              vsix/anytime-database-darwin-x64.vsix \
              vsix/anytime-database-darwin-arm64.vsix \
              vsix/anytime-database-win32-x64.vsix \
              vsix/anytime-database-win32-arm64.vsix \
            --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Anytime Database ${{ steps.version.outputs.version }}
          files: vsix/anytime-database-*.vsix
          generate_release_notes: true
