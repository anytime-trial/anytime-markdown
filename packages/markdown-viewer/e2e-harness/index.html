<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>markdown-viewer acceptance harness</title>
<style>
  html, body { margin: 0; padding: 0; }
  #stage { width: 900px; min-height: 600px; padding: 16px; box-sizing: border-box; }
</style>
</head>
<body>
<div id="stage"><anytime-markdown-editor id="editor"></anytime-markdown-editor></div>
<script src="../dist/anytime-markdown-editor.iife.js"></script>
<script>
  // 受入ファーム（S1）専用の最小ハーネス。theme はクエリで切り替える（VRT はダーク/ライト両モード必須）。
  const params = new URLSearchParams(location.search);
  const theme = params.get("theme") === "dark" ? "dark" : "light";
  const editor = document.getElementById("editor");
  editor.setAttribute("theme", theme);
  document.documentElement.style.colorScheme = theme;
  document.body.style.background = theme === "dark" ? "#1e1e1e" : "#ffffff";
  window.__harness = {
    setValue: (md) => { editor.value = md; },
    getValue: () => editor.value,
  };
  window.__harnessReady = true;
</script>
</body>
</html>
