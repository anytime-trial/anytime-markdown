<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- robot head -->
  <rect x="4.5" y="6" width="15" height="11" rx="2.5" fill="currentColor"/>
  <!-- antenna -->
  <line x1="12" y1="3" x2="12" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="2.5" r="1.2" fill="currentColor"/>
  <!-- eyes (negative) -->
  <circle cx="9" cy="11" r="1.6" fill="#000000"/>
  <circle cx="15" cy="11" r="1.6" fill="#000000"/>
  <!-- mouth (negative) -->
  <rect x="9" y="14" width="6" height="1.3" rx="0.5" fill="#000000"/>
  <!-- side mounts -->
  <rect x="3" y="9" width="1.5" height="5" rx="0.5" fill="currentColor"/>
  <rect x="19.5" y="9" width="1.5" height="5" rx="0.5" fill="currentColor"/>
</svg>
