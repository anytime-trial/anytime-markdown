<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anytime Markdown</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      /* エディタを全画面に広げる。テーマ CSS 変数は WC 側が editor root に注入する。 */
      anytime-markdown-editor {
        display: block;
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <!--
      theme: light | dark（省略時は WC 既定）
      locale: ja | en
      read-only: 属性が存在すると読み取り専用
      初期 Markdown は value プロパティ（editor.js）または slot で渡す
    -->
    <anytime-markdown-editor theme="light" locale="ja"></anytime-markdown-editor>
    <script type="module" src="./editor.js"></script>
  </body>
</html>
